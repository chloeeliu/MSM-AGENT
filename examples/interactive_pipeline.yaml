run:
  output_dir: "runs"
  run_name: "ala2_stages"
  seed: 42

data:
  kind: "xtc"
  dir: "../ala2_test_data"
  topology: "../ala2_test_data/ala2.pdb"
  saving_interval: 1
  stride: 1

features:
  type: "distance"
  selection: "distances"
  atom_selection: "HEAVY"

tica:
  lag_time_frames_range: [1, 50]
  n_components: 4
  lag_time_frames_grid_size: 20

microMSM:
  lag_time_frames_range: [1, 20]
  lag_time_frames_grid_size: 20
  n_timescales: 5
  reversible_type: transpose
  ergodic_cutoff: 0.0

macroMSM:
  n_macrostates: 4
  lump_method: PCCAPlus

clustering:
  method: KMeans
  n_clusters: 50
  tiny_threshold: 10

plots:
  gridsize: 120

evaluation:
  plateau_k: null
  plateau_threshold: 0.1
  plateau_last_step: 4
  min_occupancy: 10
  ck_plot_only: False
  ck_test_steps: 4
  ck_test_states: 6