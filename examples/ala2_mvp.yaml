run:
  output_dir: runs
  run_name: ala2_test
  seed: 42

data:
  kind: xtc
  dir: /Users/chloe/Desktop/project/msm/msm_agent/msm_agent/ala2_test_data
  topology: /Users/chloe/Desktop/project/msm/msm_agent/msm_agent/ala2_test_data/ala2.pdb
  stride: 1
  saving_interval: 1.0
  load_preprocessed_dir: null

features:
  type: angle
  selection:
    - phi
    - psi
  atom_selection: BACKBONE

tica:
  lag_time_frames_range:
    - 1
    - 10
  lag_time_frames_grid_size: 20
  n_components: 2
  selected_lag_time: null
  selected_n_components: null

plots:
  gridsize: 40
  bins: 50

gates:
  plateau_k: 3
  plateau_last_step: 3
  min_occupancy: 5

clustering:
  method: KMeans
  n_clusters: 50

msm:
  lag_time_frames_range:
    - 1
    - 10
  n_timescales: 5
  reversible_type: mle
  ergodic_cutoff: 1.0